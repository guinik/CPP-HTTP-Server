services:
  app:
    build: .
    expose:
      - "2700"

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/server.crt:/etc/nginx/certs/server.crt:ro
      - ./nginx/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      - app
